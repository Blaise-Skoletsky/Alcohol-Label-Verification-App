<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Sky background -->
  <rect width="32" height="32" rx="6" fill="#1a1a2e"/>

  <!-- Pediment (triangular roof) -->
  <polygon points="4,14 16,4 28,14" fill="#e8d5a3"/>

  <!-- Entablature (horizontal band below pediment) -->
  <rect x="4" y="14" width="24" height="3" fill="#d4c080"/>

  <!-- Columns (6) -->
  <rect x="5"  y="17" width="3" height="8" rx="1" fill="#e8d5a3"/>
  <rect x="10" y="17" width="3" height="8" rx="1" fill="#e8d5a3"/>
  <rect x="15" y="17" width="3" height="8" rx="1" fill="#e8d5a3"/>
  <rect x="20" y="17" width="3" height="8" rx="1" fill="#e8d5a3"/>
  <rect x="24" y="17" width="3" height="8" rx="1" fill="#e8d5a3"/>

  <!-- Stylobate (base platform) -->
  <rect x="3" y="25" width="26" height="2" rx="1" fill="#d4c080"/>

  <!-- Steps -->
  <rect x="5"  y="27" width="22" height="1.5" rx="0.5" fill="#c2a84a"/>
  <rect x="7"  y="28.5" width="18" height="1.5" rx="0.5" fill="#b09030"/>

  <!-- Door (center, between middle columns) -->
  <rect x="13.5" y="20" width="5" height="5" rx="0.5" fill="#1a1a2e"/>
</svg>
